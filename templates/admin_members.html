{% extends "base.html" %}
{% block title %}Members{% endblock %}
{% block content %}

<h1>Members</h1>
<p class="subtitle">{{ members|length }} registered members.</p>

<div class="card">
  <table>
    <thead><tr><th>Name</th><th>Email</th><th>Joined</th><th>Total Borrows</th></tr></thead>
    <tbody>
      {% for m in members %}
      <tr>
        <td>{{ m.full_name }}</td>
        <td>{{ m.email }}</td>
        <td>{{ m.created_at[:10] }}</td>
        <td>{{ m.total_borrows }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
