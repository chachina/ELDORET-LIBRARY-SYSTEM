{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="hero-bg hero-auth">
<div class="card auth-card">
  <h1>Create your account</h1>
  <p class="subtitle">Join the Eldoret Book Club &amp; Library.</p>
  <form method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="full_name" required placeholder="Jane Wanjiku">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn" style="width:100%">Create Account</button>
  </form>
  <p style="margin-top:14px; font-size:0.85rem; color:var(--muted)">
    Already have an account? <a href="{{ url_for('login') }}">Log in</a>
  </p>
</div>
</div>
{% endblock %}
