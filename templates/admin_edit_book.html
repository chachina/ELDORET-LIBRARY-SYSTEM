{% extends "base.html" %}
{% block title %}Edit Book{% endblock %}
{% block content %}

<h1>Edit Book</h1>
<div class="card">
  <form method="POST">
    <div class="form-row">
      <div class="form-group"><label>Title</label><input type="text" name="title" value="{{ book.title }}" required></div>
      <div class="form-group"><label>Author</label><input type="text" name="author" value="{{ book.author }}" required></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Genre</label><input type="text" name="genre" value="{{ book.genre }}" required></div>
      <div class="form-group"><label>Subject</label><input type="text" name="subject" value="{{ book.subject or '' }}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>ISBN</label><input type="text" name="isbn" value="{{ book.isbn or '' }}"></div>
      <div class="form-group"><label>Total Copies</label><input type="number" name="total_copies" value="{{ book.total_copies }}" min="1" required></div>
      <div class="form-group"><label>Cover Color</label><input type="color" name="cover_color" value="{{ book.cover_color }}"></div>
    </div>
    <div class="form-group"><label>Description</label><textarea name="description">{{ book.description or '' }}</textarea></div>
    <button type="submit" class="btn">Save Changes</button>
    <a class="btn btn-outline" href="{{ url_for('admin_books') }}">Cancel</a>
  </form>
</div>

{% endblock %}
